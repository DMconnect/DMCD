name: Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: pyinstaller --onefile DMCD.py

      - name: Copy extra files (Windows)
        if: runner.os == 'Windows'
        run: |
          copy LICENSE dist\
          xcopy caps dist\caps\ /E /I /Y

      - name: Copy extra files (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cp LICENSE dist/
          cp -r caps dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}
          path: dist/
